name: Deploy FastAPI to Azure Web App - carrier-allocation-dashboard

on:
  push:
    branches:
      - main

concurrency:
  group: "backend-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Deploy ONLY backend folder to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: carrier-allocation-dashboard
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_58B20DACB44747B488AB8E667CD5EF7B }}
          package: backend

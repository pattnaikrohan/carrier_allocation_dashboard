name: Deploy FastAPI to Azure Web App - carrier-allocation-dashboard

on:
  push:
    branches:
      - main

concurrency:
  group: "backend-deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: carrier-allocation-dashboard
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_58B20DACB44747B488AB8E667CD5EF7B }}
          package: backend
